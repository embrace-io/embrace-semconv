name: Check

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  check:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Install Weaver
        run: |
          scripts/install-weaver.sh "$HOME/.local/bin"
          echo "$HOME/.local/bin" >> "$GITHUB_PATH"

      - name: Validate registry (schema + shared policies)
        run: scripts/check.sh

  docs-drift:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Install Weaver
        run: |
          scripts/install-weaver.sh "$HOME/.local/bin"
          echo "$HOME/.local/bin" >> "$GITHUB_PATH"

      - name: Regenerate docs
        run: scripts/generate-docs.sh

      - name: Check committed docs are in sync
        run: |
          untracked=$(git ls-files --others --exclude-standard -- docs/)
          if ! git diff --exit-code -- docs/ || [ -n "$untracked" ]; then
            echo "::error::Committed docs under docs/ are out of sync with model/ and templates/. Run scripts/generate-docs.sh and commit the result with your change."
            {
              echo "## Docs drift detected"
              echo ""
              echo "The committed markdown under \`docs/\` does not match what \`model/\` and \`templates/\` generate."
              echo "Regenerate the docs and commit them together with your change:"
              echo ""
              echo '```bash'
              echo "scripts/install-weaver.sh   # once, if weaver is not on PATH"
              echo "scripts/generate-docs.sh"
              echo "git add docs/"
              echo '```'
              if [ -n "$untracked" ]; then
                echo ""
                echo "Untracked generated files:"
                echo ""
                echo '```'
                echo "$untracked"
                echo '```'
              fi
              echo ""
              echo "<details><summary>Diff against committed docs</summary>"
              echo ""
              echo '```diff'
              git diff -- docs/
              echo '```'
              echo "</details>"
            } >> "$GITHUB_STEP_SUMMARY"
            exit 1
          fi
          echo "OK: committed docs are up to date"

  # Aggregate gate for branch protection: require only this job.
  required-status-check:
    if: always()
    needs:
      - check
      - docs-drift
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Fail if any dependency did not pass
        if: contains(needs.*.result, 'failure') || contains(needs.*.result, 'cancelled') || contains(needs.*.result, 'skipped')
        run: exit 1
