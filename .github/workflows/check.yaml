name: Check

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  check:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Read pinned weaver version
        id: weaver
        run: |
          source versions.env
          echo "version=$WEAVER_VERSION" >> "$GITHUB_OUTPUT"

      - name: Install Weaver
        uses: ./.github/actions/setup-weaver
        with:
          version: ${{ steps.weaver.outputs.version }}

      - name: Validate registry (schema + shared policies)
        run: scripts/check.sh

  docs-drift:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Read pinned weaver version
        id: weaver
        run: |
          source versions.env
          echo "version=$WEAVER_VERSION" >> "$GITHUB_OUTPUT"

      - name: Install Weaver
        uses: ./.github/actions/setup-weaver
        with:
          version: ${{ steps.weaver.outputs.version }}

      - name: Regenerate docs
        run: scripts/generate-docs.sh

      - name: Check committed docs are in sync
        uses: ./.github/actions/assert-no-drift
        with:
          path: docs
          label: docs
          regenerate-hint: |
            .github/actions/setup-weaver/install-weaver.sh   # once, if weaver is not on PATH
            scripts/generate-docs.sh
            git add docs/

  # Aggregate gate for branch protection: require only this job.
  required-status-check:
    if: always()
    needs:
      - check
      - docs-drift
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Fail if any dependency did not pass
        if: contains(needs.*.result, 'failure') || contains(needs.*.result, 'cancelled') || contains(needs.*.result, 'skipped')
        run: exit 1
